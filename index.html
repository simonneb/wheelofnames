<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wheel of Names</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Wheel of Names</h1>
  </header>

  <main class="layout">
    <section class="panel" aria-labelledby="names-heading">
      <div class="panel-header">
        <h2 id="names-heading">Names</h2>
      </div>
      <div class="panel-body">
        <label for="names-input" class="sr-only">Names (one per line)</label>
        <textarea id="names-input" rows="12" placeholder="One name per line"></textarea>
        <div class="controls">
          <!-- <button id="load-json" type="button">Load from names.json</button> -->
            <button id="apply-names" type="button">Use text</button>
            <button id="save-local" type="button">Save to browser</button>
            <!--  <button id="export-json" type="button">Export names.json</button> -->
        </div>
      </div>
    </section>

    <section class="panel" aria-labelledby="wheel-heading">
      <div class="panel-header">
        <h2 id="wheel-heading">Wheel</h2>
      </div>
      <div class="panel-body wheel-area">
        <canvas id="wheel" width="500" height="500" aria-label="Spinning wheel" role="img"></canvas>
        <div class="spin-controls">
          <label for="duration">Spin duration (seconds):</label>
          <input id="duration" type="number" min="1" max="20" value="10" />
          <button id="spin" type="button">Spin</button>
        </div>
        <div id="winner" class="winner" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>Vibe coded by Simon. No backend required.</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
